<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Tech Spot</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #000; /* negro total */
      color: white;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 30px;
      background: #000;
      border-bottom: 1px solid #111;
    }

    header h1 {
      color: #007bff; /* azul */
    }

    nav a {
      margin-left: 15px;
      text-decoration: none;
      color: #ccc;
    }

    nav a:hover {
      color: #007bff;
    }

    .hero {
      text-align: center;
      padding: 60px 20px;
    }

    .hero img {
      width: 280px;
      border-radius: 15px;
      box-shadow: 0 0 30px rgba(0,123,255,0.7); /* luz azul */
    }

    .hero h2 {
      margin-top: 20px;
      font-size: 30px;
    }

    .hero p {
      margin-top: 10px;
      color: #aaa;
    }

    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 25px;
      background: #007bff;
      color: white;
      border-radius: 25px;
      text-decoration: none;
      font-weight: bold;
    }

    .btn:hover {
      background: #0056b3;
    }

    .section {
      padding: 50px 20px;
      text-align: center;
    }

    .cards {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
    }

    .card {
      background: #111;
      margin: 10px;
      padding: 20px;
      width: 220px;
      border-radius: 10px;
      border: 1px solid #222;
    }

    .card:hover {
      border-color: #007bff;
    }

    footer {
      text-align: center;
      padding: 20px;
      color: #777;
      background: #000;
    }

    /* Botón flotante WhatsApp */
    .whatsapp {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #25D366;
      color: white;
      padding: 15px;
      border-radius: 50%;
      text-decoration: none;
      font-size: 18px;
    }
  </style>
</head>

<body>

<header>
  <h1>Tech Spot</h1>
  <nav>
    <a href="#">Inicio</a>
    <a href="#">Servicios</a>
    <a href="#">Contacto</a>
  </nav>
</header>

<section class="hero">
  <img src="IMG_7620.jpeg" alt="Tech Spot">

  <h2>Venta de cargadores</h2>
  <p>Cargadores rápidos, seguros y confiables</p>

  <a class="btn" href="https://wa.me/19158086291?text=Hola,%20quiero%20información%20sobre%20cargadores">
    Contáctanos
  </a>
</section>

<section class="section">
  <h3>Servicios</h3>
  <div class="cards">
    <div class="card">🔌 Venta de accesorios</div>
  </div>
</section>

<section class="section">
  <h3>¿Por qué elegirnos?</h3>
  <div class="cards">
    <div class="card">⚡ Atención rápida</div>
    <div class="card">💯 Garantía en servicio</div>
  </div>
</section>

<footer>
  © 2026 Tech Spot
</footer>

<a class="whatsapp" href="https://wa.me/19158086291?text=Hola,%20quiero%20información%20sobre%20cargadores">
  💬
</a>

</body>
</html>
