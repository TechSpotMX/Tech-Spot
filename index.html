  <!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Tech Spot</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    <img src="IMG_7620.jpeg">

    body {
      background: linear-gradient(135deg, #0f0f0f, #1a1a1a);
      color: white;
    }

    header {
      display: flex;
      justify-content: space-between;
      padding: 20px 40px;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(10px);
      position: sticky;
      top: 0;
    }

    header h1 {
      color: #00ffc3;
    }

    nav a {
      margin-left: 20px;
      text-decoration: none;
      color: #ccc;
      transition: 0.3s;
    }

    nav a:hover {
      color: #00ffc3;
    }

    .hero {
      text-align: center;
      padding: 80px 20px;
    }

    .hero img {
      width: 320px;
      border-radius: 15px;
      box-shadow: 0 0 30px rgba(0,255,195,0.3);
      transition: 0.3s;
    }

    .hero img:hover {
      transform: scale(1.05);
    }

    .hero h2 {
      font-size: 38px;
      margin-top: 25px;
    }

    .hero p {
      color: #aaa;
      margin-top: 10px;
    }

    .btn {
      display: inline-block;
      margin-top: 25px;
      padding: 12px 30px;
      background: #00ffc3;
      color: black;
      border-radius: 30px;
      text-decoration: none;
      font-weight: bold;
      transition: 0.3s;
    }

    .btn:hover {
      background: #00cfa3;
      transform: scale(1.05);
    }

    .section {
      padding: 60px 20px;
      text-align: center;
    }

    .section h3 {
      margin-bottom: 30px;
      font-size: 28px;
    }

    .cards {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
    }

    .card {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      margin: 10px;
      padding: 25px;
      width: 250px;
      border-radius: 15px;
      transition: 0.3s;
      border: 1px solid rgba(255,255,255,0.1);
    }

    .card:hover {
      transform: translateY(-8px);
      border-color: #00ffc3;
    }

    footer {
      text-align: center;
      padding: 20px;
      color: #777;
      background: #000;
    }
  </style>
</head>

<body>

<header>
  <h1>Tech Spot</h1>
  <nav>
    <a href="#">Inicio</a>
    <a href="#">Servicios</a>
    <a href="#">Contacto</a>
  </nav>
</header>

<section class="hero">
  <img src="img/banner.jpg" alt="Tech Spot">
  <h2>Soluciones en tecnología</h2>
  <p>Reparación, venta y soporte profesional</p>
  <a class="btn" href="https://wa.me/521XXXXXXXXXX">Contáctanos</a>
</section>

<section class="section">
  <h3>Servicios</h3>
  <div class="cards">
    <div class="card">📱 Reparación de celulares</div>
    <div class="card">💻 Mantenimiento de PCs</div>
    <div class="card">🎧 Venta de accesorios</div>
  </div>
</section>

<section class="section">
  <h3>¿Por qué elegirnos?</h3>
  <div class="cards">
    <div class="card">⚡ Atención rápida</div>
    <div class="card">🔧 Técnicos expertos</div>
    <div class="card">💯 Garantía en servicio</div>
  </div>
</section>

<footer>
  © 2026 Tech Spot
</footer>

</body>
</html>
